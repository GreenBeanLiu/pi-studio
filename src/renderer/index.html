<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pi-studio</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Browser preview mock: inject window.api when not running in Electron -->
    <script>
      if (!window.api) {
        window.api = {
          win: { minimize: () => {}, maximize: () => {}, close: () => {}, flash: () => {} },
          sessions: {
            list: () => Promise.resolve([]),
            switch: () => Promise.resolve({ cancelled: false }),
            rename: () => Promise.resolve(),
            delete: () => Promise.resolve({ ok: true }),
          },
          git: {
            diff: () => Promise.resolve({ ok: true, snapshot: { status: '', unstagedStat: '', unstagedDiff: '', stagedStat: '', stagedDiff: '', truncated: false } }),
          },
          app: { version: () => Promise.resolve('0.1.0-preview') },
          diagnostics: { save: () => Promise.resolve({ ok: true, path: 'mock-diagnostics.json' }) },
          settings: {
            load: () => Promise.resolve({ provider: 'anthropic', apiKey: '', model: '', baseUrl: '', favoriteModels: '', tavilyApiKey: '', heliconeApiKey: '', securityGuardEnabled: true, subagentsEnabled: true, recentWorkspaces: [] }),
            save: () => Promise.resolve({ ok: true }),
          },
          workspace: {
            list: () => Promise.resolve([]),
            pickDirectory: () => Promise.resolve(null),
            open: () => Promise.resolve({ error: 'mock: not running in Electron' }),
            remove: () => Promise.resolve([]),
          },
          pi: {
            prompt: () => Promise.resolve(),
            steer: () => Promise.resolve(),
            followUp: () => Promise.resolve(),
            abort: () => Promise.resolve(),
            bash: () => Promise.resolve(),
            newSession: () => Promise.resolve({ cancelled: false }),
            getState: () => Promise.resolve(null),
            getMessages: () => Promise.resolve([]),
            getAvailableModels: () => Promise.resolve([]),
            getCommands: () => Promise.resolve([]),
            setModel: () => Promise.resolve(),
            setThinkingLevel: () => Promise.resolve(),
            setSteeringMode: () => Promise.resolve(),
            setFollowUpMode: () => Promise.resolve(),
            setAutoCompaction: () => Promise.resolve(),
            compact: () => Promise.resolve({}),
            extensionUiResponse: () => Promise.resolve(),
            onEvent: () => () => {},
          },
          update: { onAvailable: () => () => {}, onDownloaded: () => () => {}, onError: () => () => {}, install: () => {} },
        };
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
