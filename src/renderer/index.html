<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pi-studio</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Browser preview mock: inject window.api when not running in Electron -->
    <script>
      if (!window.api) {
        window.api = {
          win: { minimize: () => {}, maximize: () => {}, close: () => {}, flash: () => {} },
          sessions: {
            list: () => Promise.resolve([]),
            switch: () => Promise.resolve({ cancelled: false }),
            rename: () => Promise.resolve(),
            delete: () => Promise.resolve({ ok: true }),
            exportCurrent: () => Promise.resolve({ ok: true, path: 'mock-session.md' }),
          },
          git: {
            diff: () => Promise.resolve({ ok: true, snapshot: { status: '', files: [], unstagedStat: '', unstagedDiff: '', stagedStat: '', stagedDiff: '', truncated: false } }),
            acceptChanges: () => Promise.resolve({ ok: true }),
            discardChanges: () => Promise.resolve({ ok: true, snapshot: { status: '', files: [], unstagedStat: '', unstagedDiff: '', stagedStat: '', stagedDiff: '', truncated: false } }),
            showFile: () => Promise.resolve({ ok: true }),
          },
          app: { version: () => Promise.resolve('0.1.0-preview') },
          diagnostics: {
            getLogs: () => Promise.resolve({ ok: true, content: '' }),
            save: () => Promise.resolve({ ok: true, path: 'mock-diagnostics.json' }),
          },
          settings: {
            load: () => Promise.resolve({ provider: 'anthropic', apiKey: '', model: '', baseUrl: '', favoriteModels: '', tavilyApiKey: '', heliconeApiKey: '', securityGuardEnabled: true, subagentsEnabled: true, imageEngine: '', comfyDir: '', comfyPythonPath: '', comfyLaunchArgs: '', comfyCheckpoint: '', cloudImageRelay: '', cloudImageKey: '', recentWorkspaces: [] }),
            save: () => Promise.resolve({ ok: true }),
            testConnection: () => Promise.resolve({ ok: true, message: 'mock connection ok' }),
            listModels: () => Promise.resolve({ ok: true, message: 'mock models loaded', models: ['gpt-5.5', 'gpt-5.4'] }),
          },
          securityPolicy: {
            load: () => Promise.resolve({ scope: 'default', policy: { commandAllowlist: [], commandBlocklist: [], writeAllowlist: [], writeBlocklist: [], requireConfirmationForDangerousCommands: true, blockProtectedPaths: true, blockOutsideWorkspace: true } }),
            save: (policy) => Promise.resolve({ ok: true, scope: 'default', policy }),
            addRule: ({ target, rule }) => Promise.resolve({ ok: true, scope: 'default', policy: { commandAllowlist: target === 'commandAllowlist' ? [rule] : [], commandBlocklist: target === 'commandBlocklist' ? [rule] : [], writeAllowlist: target === 'writeAllowlist' ? [rule] : [], writeBlocklist: target === 'writeBlocklist' ? [rule] : [], requireConfirmationForDangerousCommands: true, blockProtectedPaths: true, blockOutsideWorkspace: true } }),
          },
          workspace: {
            list: () => Promise.resolve([]),
            pickDirectory: () => Promise.resolve(null),
            open: () => Promise.resolve({ error: 'mock: not running in Electron' }),
            remove: () => Promise.resolve([]),
          },
          memory: {
            load: () => Promise.resolve({ ok: true, memory: { path: '.pi-studio/memory.md', exists: false, content: '# Workspace Memory\n\n' } }),
            save: (content) => Promise.resolve({ ok: true, memory: { path: '.pi-studio/memory.md', exists: true, content } }),
          },
          pi: {
            prompt: () => Promise.resolve(),
            steer: () => Promise.resolve(),
            followUp: () => Promise.resolve(),
            abort: () => Promise.resolve(),
            bash: () => Promise.resolve(),
            newSession: () => Promise.resolve({ cancelled: false }),
            getState: () => Promise.resolve(null),
            getMessages: () => Promise.resolve([]),
            getAvailableModels: () => Promise.resolve([]),
            getCommands: () => Promise.resolve([]),
            setModel: () => Promise.resolve(),
            setThinkingLevel: () => Promise.resolve(),
            setSteeringMode: () => Promise.resolve(),
            setFollowUpMode: () => Promise.resolve(),
            setAutoCompaction: () => Promise.resolve(),
            compact: () => Promise.resolve({}),
            extensionUiResponse: () => Promise.resolve(),
            onEvent: () => () => {},
            onStatus: () => () => {},
          },
          update: { onAvailable: () => () => {}, onDownloaded: () => () => {}, onError: () => () => {}, install: () => {} },
        };
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
